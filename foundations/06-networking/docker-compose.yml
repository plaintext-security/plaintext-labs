services:
  server:
    image: python:3.12-slim
    command: python3 -m http.server 80
    working_dir: /data
    volumes:
      - ./data/www:/data

  lab:
    image: nicolaka/netshoot:latest
    depends_on: [server]
    command: sleep infinity
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - .:/lab

  demo:
    image: python:3.12-slim
    depends_on: [server]
    volumes:
      - .:/lab
    working_dir: /lab
    command: python3 demo.py
