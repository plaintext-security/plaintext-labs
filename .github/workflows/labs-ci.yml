name: Labs CI

# Keeps the reference labs provably runnable and in lockstep with the curriculum.
#   - On PRs: validate consistency, then run `make up && make demo && make down` for the
#     CHANGED labs only (fast feedback).
#   - Nightly: run the full opt-in matrix so rot (a moved base image, a changed flag) surfaces within a day.
#   - Manual: workflow_dispatch with an optional single-lab filter.
#
# OPT-IN: only labs that ship a CI-runnable reference demo are enforced — a lab opts in by
# committing a `.ci-demo` marker file. This is deliberate: the curriculum intentionally ships
# learner-exercise labs whose `make demo` fails until the learner completes it (e.g. a Dockerfile
# the learner must write, or `# YOU:` scaffolds), plus some VM/cloud labs that can't run on a Linux
# runner. Those must NOT show as "broken". Add a `.ci-demo` to a lab once its demo is green here.

on:
  pull_request:
    paths: ["**"]
  schedule:
    - cron: "0 6 * * *"        # 06:00 UTC nightly — full sweep
  workflow_dispatch:
    inputs:
      only:
        description: "Optional: a single lab path to run, e.g. offensive/06-web-injection"
        type: string

permissions:
  contents: read

concurrency:
  group: labs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  consistency:
    # Prose <-> labs lockstep. Would have caught the PowerShell renumbering drift.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: plaintext-labs }
      - uses: actions/checkout@v4
        with: { repository: plaintext-security/plaintext, path: plaintext }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Check tracks <-> labs consistency
        working-directory: plaintext-labs
        run: python scripts/check_consistency.py --tracks ../plaintext/tracks --labs .

  discover:
    # Build the matrix of lab dirs to run: changed-on-PR, full otherwise.
    needs: consistency
    runs-on: ubuntu-latest
    outputs:
      labs: ${{ steps.set.outputs.labs }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: set
        shell: bash
        run: |
          set -euo pipefail
          # Opt-in: a lab is enforced only if it ships a `.ci-demo` marker (a green reference demo).
          all_labs() { for m in $(git ls-files '**/.ci-demo'); do dirname "$m"; done | sort -u; }
          if [ -n "${{ inputs.only }}" ]; then
            labs="${{ inputs.only }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            changed=$(git diff --name-only "$base"...HEAD | awk -F/ 'NF>=2{print $1"/"$2}' | sort -u)
            labs=$(comm -12 <(all_labs) <(echo "$changed") || true)
          else
            labs=$(all_labs)
          fi
          # Emit a JSON array for the matrix (empty array if nothing changed).
          # NB: grep exits 1 when $labs is empty (no opted-in lab changed on this PR);
          # `|| true` keeps that expected, non-error case from aborting under `set -eo pipefail`.
          json=$(printf '%s\n' "$labs" | grep -v '^$' | jq -R . | jq -cs . || true)
          echo "labs=${json:-[]}" >> "$GITHUB_OUTPUT"
          echo "Will run: ${json:-[]}"

  run-labs:
    needs: discover
    if: needs.discover.outputs.labs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        lab: ${{ fromJSON(needs.discover.outputs.labs) }}
    steps:
      - uses: actions/checkout@v4
      - name: up / demo / down
        working-directory: ${{ matrix.lab }}
        timeout-minutes: 20
        run: |
          set -euo pipefail
          echo "::group::make up";   make up;   echo "::endgroup::"
          echo "::group::make demo"; make demo; echo "::endgroup::"
      - name: teardown (always)
        if: always()
        working-directory: ${{ matrix.lab }}
        run: make down || true
