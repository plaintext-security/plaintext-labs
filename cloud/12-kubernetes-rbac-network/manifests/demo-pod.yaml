# demo-pod: runs as the ci-deployer SA so you can run kubectl auth can-i --list from inside it.
apiVersion: v1
kind: Pod
metadata:
  name: demo-pod
  namespace: default
  labels:
    app: demo
    module: "12"
spec:
  serviceAccountName: ci-deployer
  containers:
    - name: kubectl
      image: bitnami/kubectl:1.30
      command: ["sleep", "infinity"]
      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"
        limits:
          memory: "128Mi"
          cpu: "100m"
  restartPolicy: Never
