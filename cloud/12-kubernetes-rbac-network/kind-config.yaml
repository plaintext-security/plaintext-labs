# kind cluster config for Module 12 — Kubernetes RBAC & Network Policy
# Single node; enable audit logging so API calls are captured.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: plaintext-lab
nodes:
  - role: control-plane
    # Enable audit logging for the control plane
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiServer:
          extraArgs:
            audit-log-path: /var/log/kubernetes/audit.log
            audit-log-maxage: "1"
            audit-log-maxbackup: "1"
            audit-log-maxsize: "10"
          extraVolumes:
            - name: audit-log
              hostPath: /var/log/kubernetes
              mountPath: /var/log/kubernetes
              readOnly: false
              pathType: DirectoryOrCreate
networking:
  # Use Calico for NetworkPolicy enforcement in kind
  disableDefaultCNI: false
