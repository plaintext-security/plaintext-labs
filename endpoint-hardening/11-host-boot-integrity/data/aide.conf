# Module 11 — Host & Boot Integrity — AIDE configuration
# A deliberately small, legible AIDE policy scoped to the watched tree(s) the lab
# tampers with. A real CIS-style policy watches /bin, /sbin, /usr, /etc, /boot,
# kernel modules, and audits SUID/SGID across the whole filesystem — that is huge
# and slow, so here we watch a representative slice you can reason about end to end.

# --- Where the baseline database lives ---------------------------------------
# THE GOTCHA THIS LAB TEACHES: the DB is the trust anchor. An attacker who can
# rewrite database_out defeats AIDE silently. In production this DB (and the
# config, and the aide binary) belong on read-only/offline media. Here it sits in
# /var/lib/aide so the lab is self-contained — see lab.md for the offline-baseline
# discussion and the re-baseline step.
database_in  = file:/var/lib/aide/aide.db
database_out = file:/var/lib/aide/aide.db.new
report_url   = stdout

# --- Attribute groups: what "changed" means ----------------------------------
# Checksums + ownership + permissions + size + inode metadata. sha256 is the
# content fingerprint; p/u/g/n catch a permission/owner flip even when bytes
# are unchanged (e.g. a file made SUID-root in place).
ALLXTRA = p+u+g+n+s+b+m+c+sha256
# For volatile content, you'd drop mtime; we keep it strict here so any touch shows.

# --- What to watch -----------------------------------------------------------
# The application tree: binaries, config, and web root. Any content, permission,
# or ownership change is reported.
/srv/app  ALLXTRA

# Cron is a classic persistence spot — a planted job here must be flagged.
# (We watch the dir so an *added* file is detected, not just edits to existing ones.)
/etc/cron.d  ALLXTRA
