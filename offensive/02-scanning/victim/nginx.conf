server {
    listen 80;
    server_name _;
    server_tokens on;
    add_header X-Powered-By "Meridian-Portal/2.1";
    location / {
        return 200 '<html><head><title>Meridian Financial Portal</title></head><body><h1>Meridian Financial — Client Portal</h1><p>Version 2.1 — Internal Use Only</p></body></html>';
        add_header Content-Type text/html;
    }
    location /api/ {
        return 200 '{"status":"ok","version":"2.1","env":"production"}';
        add_header Content-Type application/json;
    }
    location /admin {
        return 403;
    }
}

server {
    listen 443 ssl;
    server_name _;
    server_tokens on;
    ssl_certificate     /etc/nginx/ssl.crt;
    ssl_certificate_key /etc/nginx/ssl.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header X-Powered-By "Meridian-Portal/2.1";
    location / {
        return 200 '<html><head><title>Meridian Financial Secure Portal</title></head><body><h1>Meridian Financial — Secure Portal</h1></body></html>';
        add_header Content-Type text/html;
    }
}
