# Module 03 — Device Trust & Posture
# headscale coordination server + a protected target service + a registered node.
# make up: start headscale + target-service + node
# make demo: register the node, verify access, demonstrate default-deny for unregistered peers

networks:
  ztna-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

services:
  headscale:
    image: headscale/headscale:0.23.0
    command: serve
    volumes:
      - headscale-data:/var/lib/headscale
      - ./data/headscale-config.yaml:/etc/headscale/config.yaml:ro
      - ./data/headscale-acl.yaml:/etc/headscale/acls.yaml:ro
    ports:
      - "8088:8080"
    networks:
      ztna-net:
        ipv4_address: 172.28.0.2
    healthcheck:
      test: ["CMD-SHELL", "headscale version || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  target-service:
    image: nginx:1.27.0-alpine
    volumes:
      - ./data/nginx-status.html:/usr/share/nginx/html/index.html:ro
    networks:
      ztna-net:
        ipv4_address: 172.28.0.3
    # Not exposed on the host — only reachable via the mesh (demonstrating ZT access control).
    expose:
      - "80"

  node:
    image: alpine:3.20.1
    depends_on:
      headscale:
        condition: service_healthy
    networks:
      ztna-net:
        ipv4_address: 172.28.0.4
    command: sleep infinity
    cap_add:
      - NET_ADMIN

volumes:
  headscale-data:
