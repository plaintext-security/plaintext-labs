# headscale configuration for Lab 03 — Device Trust & Posture
# Minimal configuration for local lab use only. Do not use in production without hardening.

server_url: http://headscale:8080
listen_addr: 0.0.0.0:8080
metrics_listen_addr: 0.0.0.0:9090
grpc_listen_addr: 0.0.0.0:50443
grpc_allow_insecure: true

noise:
  private_key_path: /var/lib/headscale/noise_private.key

prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48
  allocation: sequential

derp:
  server:
    enabled: false
  urls:
    - https://controlplane.tailscale.com/derpmap/default
  auto_update_enabled: false
  update_frequency: 24h

disable_check_updates: true
ephemeral_node_inactivity_timeout: 30m
node_update_check_interval: 10s

database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite

acls_policy_path: /etc/headscale/acls.yaml

log:
  level: info
  format: text

dns:
  magic_dns: true
  base_domain: meridian.local
  nameservers:
    global:
      - 1.1.1.1
