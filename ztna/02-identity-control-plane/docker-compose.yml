# Module 02 — Identity as the Control Plane
# Keycloak 24.x with the Meridian realm pre-loaded from data/meridian-realm.json.
# Access the admin console at http://localhost:8080/admin (admin / admin).
# The Meridian realm is at http://localhost:8080/realms/meridian.
services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./data/meridian-realm.json:/opt/keycloak/data/import/meridian-realm.json:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/meridian || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
