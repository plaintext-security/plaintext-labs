server {
    listen 80;
    server_name _;

    # Log Cloudflare Access JWT header for lab inspection
    add_header X-Lab-Note "Cloudflare-Access-JWT-Assertion header carries the identity token" always;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Health check endpoint
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
