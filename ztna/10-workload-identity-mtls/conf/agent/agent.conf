# SPIRE agent — runs on the node, exposes the Workload API to local workloads.
# It attests the node to the server (join token), then attests each workload that
# asks for an SVID by inspecting Docker labels it can observe but they can't forge.
agent {
    data_dir           = "/opt/spire/data/agent"
    log_level          = "INFO"
    server_address     = "spire-server"
    server_port        = "8081"
    socket_path        = "/run/spire/sockets/agent.sock"
    trust_domain       = "meridian.local"
    # Lab convenience: trust the server's bundle on first connect instead of
    # shipping it out-of-band. Do NOT do this in production.
    insecure_bootstrap = true
}

plugins {
    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "memory" {
        plugin_data {}
    }

    # Workload attestation: identify the calling workload by its Docker labels.
    # Registration entries key on these (docker:label:com.meridian.svc:<name>).
    # The agent needs the host PID namespace + the Docker socket to map a caller
    # PID back to its container (set in docker-compose.yml).
    WorkloadAttestor "docker" {
        plugin_data {}
    }
}
