# SPIRE server — Meridian trust domain.
# Issues SVIDs (short-lived X.509 identity certs) to attested workloads.
server {
    bind_address       = "0.0.0.0"
    bind_port          = "8081"
    trust_domain       = "meridian.local"
    data_dir           = "/opt/spire/data/server"
    log_level          = "INFO"
    ca_ttl             = "24h"
    # Short SVID lifetime is the point: a leaked credential expires in minutes,
    # and the agent auto-rotates well before then.
    default_x509_svid_ttl = "5m"
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type     = "sqlite3"
            connection_string = "/opt/spire/data/server/datastore.sqlite3"
        }
    }

    # Node attestation: how the AGENT proves itself to the server.
    # A join token is the simplest method for a single-node lab; in production
    # this is an AWS IID, a GCP instance identity, or a k8s projected token.
    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "disk" {
        plugin_data {
            keys_path = "/opt/spire/data/server/keys.json"
        }
    }
}
